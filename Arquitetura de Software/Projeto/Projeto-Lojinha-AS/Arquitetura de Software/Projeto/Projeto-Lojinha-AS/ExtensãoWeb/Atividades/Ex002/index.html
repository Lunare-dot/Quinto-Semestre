<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UFT-8">

        <title>Resolução - Atividade 02</title>
        <body>
            <h1>DOM: Conceitos Básicos</h1>
            <hr>
            <button id="botao1">Incrementar</button>
            <button id="botao2">Decrementar</button>
            <p id="m1">Cliques: 0</p>
            <br>
            <hr>

            <label for="uEntry">Insira algo a sua lista:</label>
            <div class="input-wrapper">
                <input type="text" placeholder="Ex: Vai Corinthians..." id="uEntry">
                Contador de caracteres: <span id="count">0</span>
            </div>
            <p>Sua lista:</p>
            <p id="m2"></p>
            <br>
            <hr>

            <label for="opts">Escolha um tipo de lista:</label>
            <select name="opts" id="opts">
                <option value="opt1">Lista Não Ordenada</option>
                <option value="opt2">Lista Ordenada</option>
            </select>
            <button id="botao3">Adicionar</button>
            <p id="m3"></p>
            <br>
            <hr>

            <button id="resetB">Limpar Tudo</button>

            <script src="script.js"></script>
        </body>
    </head>
</html>
