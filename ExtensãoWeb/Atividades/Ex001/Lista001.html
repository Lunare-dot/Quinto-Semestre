<!DOCTYPE html>
<html lang = "pt-br">
    <head>
        <meta charset="UFT-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Resolução da Atividade 01</title>
    </head>
    <body>
        <h1>Lista de Exercícios - 001</h1>

        <div id="nav">
            <button onclick="loadQuestion(1)">Q1</button>
            <button onclick="loadQuestion(2)">Q2</button>
            <button onclick="loadQuestion(3)">Q3</button>
        </div>

        <div id="questionArea"></div>

        <script>
            const questions = {
                1: `
                <form method="post" id="contactForm">
                    <h4>Crie um jogo onde o computador gera um número aleatório de 1 a 20, e o usuário
                    <br>precisa adivinhar qual é. O jogo deve dar dicas se o número digitado for maior ou menor
                    <br>que o número secreto. O jogo só termina quando o usuário acertar.<br>
                    </h4>
                    <label for="uNum">Insira um Número:</label>
                    <input type="number" id="uNum" name="userNum" placeholder="Número inteiro de 1 a 20...">
                    <input type="submit" value="Submit"/>
                    <p id="message"></p>
                    <p id="message2"></p>
                </form>
                `,
                2: `
                    <h4> Crie um jogo de Pedra, Papel ou Tesoura onde:
                    <br>• O usuário escolhe uma das três opções digitando no prompt().
                    <br>• O computador escolhe uma opção aleatória.
                    <br>• O programa deve determinar o vencedor e exibir o resultado no console.log()<br>
                    </h4>
                `,
                3: ` 
                <form method= post id= contactForm>
                    <h4> Crie um programa que pede ao usuário para digitar um número e, em seguida, exibe
                    <br>a tabuada desse número de 1 a 10 no formato de uma tabela.
                    <br>Exemplo de saída:
                    <br>Se o número escolhido por 5, a saída será:
                    <br>5 x 1 = 5
                    <br>5 x 2 = 10
                    <br>5 x 3 = 15
                    <br>...
                    <br>5 x 10 = 50 
                    </h4>
                    <label for="uEntry">Insira um Número:</label>
                    <input type="number" id="uNum" name="userNum" placeholder="Ex: 5...">
                    <input type="submit" value="Submit"/>
                    <p id="message"></p>
                    <p id="message2"</p>
                </form>
                `
            };

            function loadQuestion(num) {
                console.clear();
                const area = document.getElementById("questionArea");

                area.innerHTML = `<h2>Questão ${num}</h2>` + (questions[num] || "<p>Questão não encontrada.</p>");

                const oldScript = document.getElementById("questionScript");
                if(oldScript) oldScript.remove();

                const script = document.createElement("script");
                script.src = `Q${num}.js`;
                script.id = "questionScript";
                document.body.appendChild(script);
            }
        </script>
    </body>
</html>
